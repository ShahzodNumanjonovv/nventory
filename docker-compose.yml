services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wholesale
      POSTGRES_PASSWORD: wholesale
      POSTGRES_DB: wholesale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wholesale -d wholesale"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://wholesale:wholesale@db:5432/wholesale
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/code

volumes:
  pgdata:
